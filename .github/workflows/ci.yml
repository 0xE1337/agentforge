name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel prior runs for the same branch/PR when new commits land.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  next:
    name: Next.js build + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Build needs eagerly-initialized clients (Supabase, etc.) to instantiate
          # without crashing, even though we don't have real runtime secrets in CI.
          # These placeholders make the modules load; they are NOT used at request time.
          NEXT_TELEMETRY_DISABLED: '1'
          SKIP_ENV_VALIDATION: '1'
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: 'placeholder'
          SUPABASE_SERVICE_ROLE_KEY: 'placeholder'
          SELLER_ADDRESS: '0x0000000000000000000000000000000000000000'
          NEXT_PUBLIC_SKILL_REGISTRY_ADDRESS: '0x0000000000000000000000000000000000000000'
          NEXT_PUBLIC_PAYMENT_GUARD_ADDRESS: '0x0000000000000000000000000000000000000000'
          NEXT_PUBLIC_MARKETPLACE_FEE_ADDRESS: '0x0000000000000000000000000000000000000000'

  contracts:
    name: Foundry build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show forge version
        run: forge --version

      - name: Build contracts
        run: forge build --sizes

      - name: Run contract tests
        run: forge test -vv
