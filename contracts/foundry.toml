[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200

remappings = [
    "forge-std/=lib/forge-std/src/",
]

fs_permissions = [
    { access = "read-write", path = "./script/deployments/" },
]

[rpc_endpoints]
arc_testnet = "https://rpc.testnet.arc.network"
